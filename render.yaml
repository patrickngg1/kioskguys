services:
  # -------------------------------------------------------
  # BACKEND — Django / Gunicorn
  # -------------------------------------------------------
  - type: web
    name: kioskguys
    runtime: python
    rootDir: smartKiosk
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn kiosks.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: kioskguys.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://kioskguys-front.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://kioskguys-front.onrender.com,https://kioskguys.onrender.com
      # Set these manually in the Render dashboard (do not commit secrets):
      # DB_NAME, DB_USER, DB_PASSWORD, DB_HOST, DB_PORT
      # SES_SMTP_USER, SES_SMTP_PASS

  # -------------------------------------------------------
  # FRONTEND — React / Vite (static site)
  # -------------------------------------------------------
  - type: web
    name: kioskguys-front
    runtime: static
    rootDir: smartKiosk
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://kioskguys.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
